name: WordpressMediaUploader
options:
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
configs:
  Debug: debug
  Release: release
targets:
  WordpressMediaUploaderApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/WordpressImageUploaderApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.degner.WordpressMediaUploader
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/WordpressImageUploaderApp/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Wordpress Media Uploader
        INFOPLIST_KEY_CFBundleName: Wordpress Media Uploader
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSRequiresAquaSystemAppearance: NO
        PRODUCT_NAME: Wordpress Media Uploader
        PRODUCT_MODULE_NAME: WordpressMediaUploaderApp
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.5"
        CODE_SIGN_STYLE: Automatic
  WordpressMediaUploaderAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/WordpressImageUploaderAppTests
    dependencies:
      - target: WordpressMediaUploaderApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.degner.WordpressMediaUploaderTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Wordpress Media Uploader.app/Contents/MacOS/Wordpress Media Uploader"
schemes:
  WordpressMediaUploader:
    build:
      targets:
        WordpressMediaUploaderApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WordpressMediaUploaderAppTests
